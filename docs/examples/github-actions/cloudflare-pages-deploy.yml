name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Node.js project
        id: node_project
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: ${{ steps.node_project.outputs.exists == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies with lockfile
        if: ${{ steps.node_project.outputs.exists == 'true' && hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        run: npm ci

      - name: Install dependencies without lockfile
        if: ${{ steps.node_project.outputs.exists == 'true' && hashFiles('package-lock.json', 'npm-shrinkwrap.json') == '' }}
        run: npm install

      - name: Build
        if: ${{ steps.node_project.outputs.exists == 'true' }}
        run: npm run build --if-present

      - name: Verify deploy directory
        shell: bash
        run: |
          if [ ! -d "__CF_PAGES_BUILD_DIR__" ]; then
            echo "Cloudflare Pages build directory not found: __CF_PAGES_BUILD_DIR__" >&2
            exit 1
          fi
          if [ -z "$(find "__CF_PAGES_BUILD_DIR__" -mindepth 1 -print -quit)" ]; then
            echo "Cloudflare Pages build directory is empty: __CF_PAGES_BUILD_DIR__" >&2
            exit 1
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ vars.CF_PAGES_BUILD_DIR }} --project-name=${{ vars.CF_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
